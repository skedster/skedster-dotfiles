[colors]
background = ${xrdb:color0:#1a1a1a}
background-alt = ${xrdb:color1:#222222}
foreground = ${xrdb:color7:#ffffff}
primary = ${xrdb:color1:#ff5555}
secondary = ${xrdb:color2:#50fa7b}
alert = ${xrdb:color3:#ffb86c}
disabled = ${xrdb:color8:#bac2de}

base = #1e1e2e
mantle = #181825
crust = #11111b
text = #cdd6f4
subtext0 = #a6adc8
subtext1 = #bac2de
surface0 = #313244
surface1 = #45475a
surface2 = #585b70
overlay0 = #6c7086
overlay1 = #7f849c
overlay2 = #9399b2
blue = #89b4fa
lavender = #b4befe
sapphire = #74c7ec
sky = #89dceb
teal = #94e2d5
green = #a6e3a1
yellow = #f9e2af
peach = #fab387
maroon = #eba0ac
red = #f38ba8
mauve = #cba6f7
pink = #f5c2e7
flamingo = #f2cdcd
rosewater = #f5e0dc
transparent = #00000000

[bar/base]

height = 30
radius = 12
background = ${colors.background}
foreground = ${colors.foreground}
separator-foreground = ${colors.primary}
border-size = 4
border-color = #00000000         
font-0 = "JetBrainsMono Nerd Font:size=10;2"
fixed-center = true
override-redirect = true
wm-restack = i3
module-margin-left = 1
module-margin-right = 1
separator = " | "

[bar/left_pill]
inherit = bar/base
width = 18%
offset-x = 1%
modules-left = i3 tray

tray-position = right
tray-maxsize = 16
tray-padding = 2

[bar/center_pill]
inherit = bar/base
width = 15%
offset-x = 42.5%
modules-center = datetime-trigger

[bar/right_pill]
inherit = bar/base
width = 23%
offset-x = 76%
padding-right = 3
padding-left = 3
modules-right = weather cpu memory network battery

[module/tray]
type = internal/tray
tray-spacing = 8px

[module/pulseaudio]
type = internal/pulseaudio
ramp-volume-foreground = ${colors.primary}
format-volume = <ramp-volume>  <label-volume>
ramp-volume-0 = пАІ
ramp-volume-1 = пА®
label-volume = "%{A1:pavucontrol &:}%percentage%%%{A}"
label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/temperature]
type = internal/temperature
interval = 12
zone-type = TCPU
warn-temperature = 60
format = "%{A1:exec xsensors:}<ramp> <label>%{A}"
format-warn = <ramp> <label-warn>
format-padding = 0
label = "%temperature-c%"
label-warn = %temperature-c%
ramp-0 = "пЛЛ"
ramp-1 = "пЛК"
ramp-2 = "пЛЙ"
ramp-3 = "пЛИ"
ramp-4 = "пЛЗ"
ramp-foreground = ${colors.primary}

[module/weather]
type = custom/script
exec = curl -s 'wttr.in/giza?format=%t+%c' | awk '{gsub(/\+/, " "); gsub(/пЄП/, ""); print $2, $1}'
interval = 3600

[module/backlight]
type = internal/backlight
enable-scroll = true
format = <ramp> <label>
ramp-foreground = ${colors.primary}
ramp-0 = рЯМХ
ramp-1 = рЯМФ
ramp-2 = рЯМУ
ramp-3 = рЯМТ
ramp-4 = рЯМС

[module/memory]
type = internal/memory
interval = 8
format = "%{A1:exec wezterm -e btop:}<ramp-used> <label>%{A}"
ramp-used-0 = "оњЕ "
ramp-used-foreground = ${colors.primary}
label = %used%

[module/cpu]
type = internal/cpu
interval = 5
format = "%{A1:exec wezterm -e btop:}<ramp-load> <label>%{A}"
label = "%percentage%%"
ramp-load-0 = "у∞НЫ"
ramp-load-foreground = ${colors.primary}

[module/network]
type = internal/network
interval = 10
interface-type = wireless
format-connected = <label-connected>
label-connected = "%{A1:wezterm start --class wifi-float -e nmtui:}у∞Ц© %{A}"
label-connected-foreground = ${colors.primary}
format-disconnected = <label-disconnected>
label-disconnected = "%{A1:wezterm start --class wifi-float -e nmtui:}у∞Ц™ %{A}"
label-disconnected-foreground = ${colors.alert}

[module/date]
type = custom/script
interval = 60
exec = ~/.config/polybar/date.sh
label-foreground = ${colors.primary}
click-left = "exec gnome-calendar"

[module/battery]
type = internal/battery
poll-interval = 15
battery = BAT0
adapter = AC0
format-charging = <ramp-capacity>у±РЛ <label-charging>
label-charging = %percentage%%
format-charging-padding = 0
format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%
format-discharging-foreground = ${colors.foreground}
format-full-prefix = "пЙА "
format-full-prefix-foreground = #A0E8A2
format-foreground = ${colors.background-alt}
format-background = #2b2f37
label-discharging-foreground = ${colors.foreground}
ramp-capacity-foreground = ${colors.primary}
label-charging-foreground = ${colors.foreground}
ramp-capacity-0 = "пЙД "
ramp-capacity-1 = "пЙГ "
ramp-capacity-2 = "пЙВ "
ramp-capacity-3 = "пЙБ "
ramp-capacity-4 = "пЙА "
format-discharging-padding = 0


[settings]
screenchange-reload = true
pseudo-transparency = true

[module/i3]
type = internal/i3
pin-workspaces = true
strip-wsnumbers = false
index-sort = true
enable-click = true
enable-scroll = false
format = <label-state> <label-mode>

ws-icon-0 = 1;1
ws-icon-1 = 2;2
ws-icon-2 = 3;3
ws-icon-3 = 4;4
ws-icon-4 = 5;5

label-focused = %icon%
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.primary}
label-focused-padding = 2
label-unfocused = %icon%
label-unfocused-padding = 2
label-urgent = %icon%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2
label-visible = %icon%
label-visible-padding = 2

[module/datetime-trigger]
type = custom/script
exec = date '+у∞Г≠ %a %b %d  у±СТ %I:%M %p'
interval = 1
click-left = ~/.config/polybar/scripts/center-dropdown.sh
cursor-click = pointer
